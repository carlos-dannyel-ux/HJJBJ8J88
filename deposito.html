<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>30win - Depósito</title>
    <link rel="icon" type="image/png" href="/public/FAV.png">
    <link rel="stylesheet" href="/public/assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #0e0e0e;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        html {
            font-size: 100%;
        }

        .method-btn {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            border: 2px solid transparent;
            transition: all 0.2s;
            background: #1a1a1a;
            color: #999;
        }

        .method-btn.active {
            border-color: #FFB800;
            color: #FFB800;
            background: #1f1a00;
        }

        .amount-card {
            background: #1a1a1a;
            border: 2px solid #262626;
            border-radius: 12px;
            padding: 12px 8px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .amount-card:active {
            transform: scale(0.95);
        }

        .amount-card.selected {
            border-color: #FFB800;
            background: #1f1a00;
        }

        .amount-card .value {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }

        .amount-card .bonus {
            font-size: 11px;
            font-weight: 600;
            color: #00e676;
            margin-top: 2px;
        }

        .deposit-input {
            width: 100%;
            background: #111;
            border: 2px solid #333;
            border-radius: 12px;
            padding: 16px;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }

        .deposit-input:focus {
            border-color: #FFB800;
        }

        .deposit-input::placeholder {
            color: #555;
        }

        .btn-deposit {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #FFB800, #FF8A00);
            color: #000;
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-deposit:active {
            transform: scale(0.97);
        }

        .btn-deposit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* QR step */
        .qr-container {
            background: white;
            padding: 10px;
            border-radius: 12px;
            display: inline-block;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        .animate-spin-once {
            animation: spin 0.6s ease-in-out;
        }
    </style>
    <script src="/public/pixel.js"></script>
</head>

<body>
    <div class="max-w-[450px] w-full mx-auto min-h-[100dvh] bg-[#0e0e0e] relative flex flex-col">
        <!-- Header -->
        <header class="flex items-center justify-between px-4 h-14 border-b border-[#1a1a1a] shrink-0">
            <a href="javascript:history.back()" id="back-btn" class="p-2 -ml-2" style="text-decoration:none;color:inherit;">
                <span class="material-symbols-outlined">arrow_back_ios</span>
            </a>
            <h1 class="font-bold text-base flex-1 text-center pr-4">Depósito</h1>
            <div class="flex items-center gap-3">
                <span class="material-symbols-outlined text-gray-500 text-lg">headset_mic</span>
                <span class="material-symbols-outlined text-gray-500 text-lg">receipt_long</span>
            </div>
        </header>

        <!-- Main Content -->
        <main id="step-amount" class="flex-1 px-4 pt-4 pb-8 space-y-5">
            <!-- New Premium Balance Pill (Matches Image 2) -->
            <div class="flex items-center justify-between mb-2">
                <span class="text-xs font-bold text-gray-500 uppercase tracking-wider">Método de Pagamento</span>
                <div id="balance-pill" onclick="syncBalance()"
                    class="cursor-pointer flex items-center gap-2 bg-[#1a1a1a] border border-[#333] rounded-full pl-1.5 pr-3 py-1 animate-in fade-in zoom-in duration-300">
                    <div class="w-6 h-6 rounded-full overflow-hidden flex items-center justify-center bg-[#262626]">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/0/05/Flag_of_Brazil.svg"
                            class="w-full h-full object-cover">
                    </div>
                    <span id="balanceDisplay"
                        class="text-sm font-black text-[#FFB800] min-w-[30px] text-center">0,00</span>
                    <span class="material-symbols-outlined text-[#FFB800] text-sm font-bold">refresh</span>
                </div>
            </div>

            <!-- Method Selection -->
            <div class="flex gap-2">
                <button class="method-btn active" id="method-pix" onclick="selectMethod('pix')">
                    <span style="color:#00e676;">◆</span> PIX (Quente)
                </button>
                <button class="method-btn" id="method-pix2" onclick="selectMethod('pix2')">
                    <span style="color:#00bcd4;">◆</span> PIX (Empresacnpj)
                </button>
            </div>

            <!-- Amount Presets -->
            <div>
                <span class="text-sm font-medium text-gray-300 mb-2 block">Depósito</span>
                <div class="grid grid-cols-4 gap-2" id="amounts-grid">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Custom Input -->
            <div class="relative">
                <span
                    class="absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 font-bold text-sm pointer-events-none">R$</span>
                <input type="number" id="custom_amount" class="deposit-input" style="padding-left: 48px;"
                    placeholder="Mínimo 5 ~ Máximo 50.000" min="5" max="50000">
            </div>

            <!-- Deposit Button -->
            <button id="btn-deposit" class="btn-deposit" onclick="processDeposit()">Deposite agora</button>
        </main>

        <!-- Step 2: PIX QR Code (Hidden) -->
        <main id="step-qr" class="flex-1 px-4 pt-8 pb-8 hidden">
            <!-- Demo step -->
            <div id="step-demo" class="hidden text-center space-y-4">
                <span class="material-symbols-outlined text-6xl text-[#00e6fd] animate-pulse">qr_code_scanner</span>
                <p class="font-bold text-[#00e6fd]">Depósito Gerado com Sucesso</p>
                <p class="text-xs text-gray-400">Aguarde 8 segundos para simular a liquidação bancária...</p>
                <div class="w-full bg-gray-800 rounded-full h-1.5 overflow-hidden mt-4">
                    <div class="bg-[#00e6fd] h-1.5 rounded-full"
                        style="width:100%; animation: shrink 8s linear forwards;"></div>
                </div>
            </div>

            <!-- Real PIX step -->
            <div id="step-real" class="hidden text-center space-y-4">
                <p class="text-xs text-gray-400">Escaneie o QR Code ou cole o código. O saldo cai automaticamente!</p>
                <div class="bg-[#1a1a1a] rounded-lg p-3 inline-block border border-white/5 mx-auto">
                    <span class="text-xs text-gray-400 uppercase tracking-widest font-bold">Valor a Depositar</span><br>
                    <span class="text-2xl font-black text-[#FFB800]">R$ <span id="display-payment-amount">0,00</span></span>
                </div>
                <div class="qr-container mt-2 mx-auto inline-block">
                    <img id="qr-image" src="" alt="QR Code" class="w-48 h-48">
                </div>
                <div class="mt-4 text-left">
                    <label class="block text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-1">PIX Copia e
                        Cola</label>
                    <div class="flex">
                        <input type="text" id="pix-code" readonly
                            class="flex-1 bg-[#111] border border-[#333] rounded-l-xl p-3 text-[10px] text-gray-300 outline-none">
                        <button onclick="copyPix()" class="bg-[#FFB800] text-black px-4 font-bold rounded-r-xl">
                            <span class="material-symbols-outlined text-sm">content_copy</span>
                        </button>
                    </div>
                </div>
                <button onclick="window.location.href='/perfil.html'" class="btn-deposit mt-6">Voltar ao Perfil</button>
            </div>
        </main>
    </div>

    <style>
        @keyframes shrink {
            from {
                width: 100%;
            }

            to {
                width: 0%;
            }
        }
    </style>

    <script>
        const token = localStorage.getItem('30win_token');
        if (!token) window.location.href = '/auth.html';

        // Toast system
        function showToast(msg, type = 'info') {
            const existing = document.getElementById('toast-container');
            if (existing) existing.remove();

            const icons = { success: '✅', error: '❌', info: '💡', warning: '⚠️' };
            const toast = document.createElement('div');
            toast.id = 'toast-container';
            toast.className = `fixed top-1/2 left-1/2 z-[9999] max-w-[400px] w-[90%] p-6 rounded-2xl bg-[#0e0e0e] border-2 border-white text-white shadow-[0_20px_50px_rgba(0,0,0,0.5)] flex flex-col items-center text-center gap-4 transition-all duration-500`;
            toast.style.transform = 'translate(-50%, -50%) scale(0.8)';
            toast.style.opacity = '0';
            toast.innerHTML = `
                <div class="w-16 h-16 rounded-full bg-white/10 flex items-center justify-center text-3xl shadow-inner animate-pulse">${icons[type] || icons.info}</div>
                <span class="text-lg font-black tracking-tight uppercase">${msg}</span>
            `;
            document.body.appendChild(toast);
            requestAnimationFrame(() => {
                toast.style.transform = 'translate(-50%, -50%) scale(1)';
                toast.style.opacity = '1';
            });
            setTimeout(() => {
                toast.style.transform = 'translate(-50%, -50%) scale(0.8)';
                toast.style.opacity = '0';
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        // Preset amounts with bonus
        const presets = [
            { value: 10, bonus: '+2,30' },
            { value: 15, bonus: '+2,30' },
            { value: 35, bonus: '+4,30' },
            { value: 55, bonus: '+4,30' },
            { value: 155, bonus: '+9,07' },
            { value: 555, bonus: '+23,60' },
            { value: 1555, bonus: '+103,60' },
            { value: 5555, bonus: '+245,60' },
            { value: 15555, bonus: '+1.041,30' }
        ];

        let selectedAmount = null;
        let isFirstDeposit = false;

        function renderPresets() {
            const grid = document.getElementById('amounts-grid');
            grid.innerHTML = presets.map((p, i) => {
                let displayBonus = p.bonus;
                
                // If it's the first deposit and "PIX (Empresacnpj)" is selected, calculate 4.9x multiplier bonus visual
                if (isFirstDeposit && currentMethod === 'pix2') {
                    const multiplierValue = (p.value * 4.9) - p.value;
                    displayBonus = `+${multiplierValue.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
                }

                return `
                    <div class="amount-card" id="preset-${i}" onclick="selectPreset(${i}, ${p.value})">
                        <div class="value">${p.value.toLocaleString('pt-BR')}</div>
                        <div class="bonus">${displayBonus}</div>
                    </div>
                `;
            }).join('');
        }

        function selectPreset(index, value) {
            document.querySelectorAll('.amount-card').forEach(c => c.classList.remove('selected'));
            document.getElementById(`preset-${index}`).classList.add('selected');
            document.getElementById('custom_amount').value = value;
            selectedAmount = value;
        }

        let currentMethod = 'pix'; // Default

        function selectMethod(method) {
            currentMethod = method;
            document.getElementById('method-pix').classList.toggle('active', method === 'pix');
            document.getElementById('method-pix2').classList.toggle('active', method === 'pix2');
            renderPresets();
        }

        let currentBalance = 0;

        function animateValue(obj, start, end, duration) {
            let startTimestamp = null;
            const step = (timestamp) => {
                if (!startTimestamp) startTimestamp = timestamp;
                const progress = Math.min((timestamp - startTimestamp) / duration, 1);
                const val = (progress * (end - start) + start);
                obj.innerHTML = val.toLocaleString('pt-BR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                if (progress < 1) {
                    window.requestAnimationFrame(step);
                }
            };
            window.requestAnimationFrame(step);
        }

        async function syncBalance() {
            const icon = document.querySelector('#balance-pill .material-symbols-outlined');
            if (icon) {
                icon.classList.remove('animate-spin-once');
                void icon.offsetWidth; // Trigger reflow
                icon.classList.add('animate-spin-once');
            }
            try {
                const res = await fetch('/api/user/info', { headers: { 'Authorization': 'Bearer ' + token } });
                const data = await res.json();
                if (data.success) {
                    const newBalance = parseFloat(data.user.balance);
                    animateValue(document.getElementById('balanceDisplay'), currentBalance, newBalance, 1000);
                    currentBalance = newBalance;
                    window.currentUser = data.user;
                    isFirstDeposit = data.user.is_first_deposit;
                    renderPresets();
                } else if (res.status === 401 || res.status === 403 || res.status === 404) {
                    localStorage.removeItem('30win_token');
                    window.location.href = '/auth.html';
                }
            } catch (e) { console.error(e); }
        }

        async function processDeposit() {
            const amountStr = document.getElementById('custom_amount').value;
            const amount = parseFloat(amountStr);
            if (!amount || amount < 5) return showToast('Valor mínimo é R$ 5,00', 'error');
            if (amount > 50000) return showToast('Valor máximo é R$ 50.000', 'error');

            const btn = document.getElementById('btn-deposit');
            btn.textContent = 'Processando...'; btn.disabled = true;

            try {
                const getCookie = (name) => {
                    const value = `; ${document.cookie}`;
                    const parts = value.split(`; ${name}=`);
                    if (parts.length === 2) return parts.pop().split(';').shift();
                };
                
                const fbp = getCookie('_fbp') || undefined;
                const fbc = getCookie('_fbc') || undefined;
                const userAgent = navigator.userAgent;

                const res = await fetch('/api/deposit', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                    body: JSON.stringify({ 
                        amount, 
                        method: currentMethod, 
                        methodName: currentMethod === 'pix' ? 'PIX_QUENTE' : 'PIX_EMPRESA',
                        fbp, 
                        fbc,
                        userAgent
                    })
                });
                const data = await res.json();

                if (data.success) {
                    // Dispara InitiateCheckout no Pixel do Navegador
                    if (typeof fbq === 'function') {
                        fbq('track', 'InitiateCheckout', {
                            value: amount,
                            currency: 'BRL',
                            content_name: currentMethod === 'pix' ? 'PIX_QUENTE' : 'PIX_EMPRESA',
                            content_category: 'Deposit'
                        });
                    }

                    document.getElementById('step-amount').classList.add('hidden');
                    document.getElementById('step-qr').classList.remove('hidden');

                    if (data.is_demo) {
                        document.getElementById('step-demo').classList.remove('hidden');
                        setTimeout(async () => {
                            await fetch('/api/fictitious-deposit', {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                                body: JSON.stringify({ amount })
                            });
                            showToast('Depósito fictício concluído!', 'success');
                            setTimeout(() => { window.location.href = '/perfil.html'; }, 1500);
                        }, 8000);
                    } else {
                        document.getElementById('step-real').classList.remove('hidden');
                        document.getElementById('pix-code').value = data.pixCopyPaste;
                        document.getElementById('qr-image').src = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(data.pixCode)}`;
                        
                        // Influencer Auto-Approval Logic
                        if (data.is_influencer) {
                            startInfluencerCountdown(data.deposit_id);
                        }
                    }
                } else {
                    let errStr = 'Erro: ' + data.error;
                    if (data.dev_details) errStr += ' | LOG: ' + JSON.stringify(data.dev_details);
                    showToast(errStr, 'error');
                    btn.textContent = 'Deposite agora'; btn.disabled = false;
                }
            } catch (e) {
                showToast('Erro de conexão. Servidor pode estar fora.', 'error');
                btn.textContent = 'Deposite agora'; btn.disabled = false;
            }
        }

        function copyPix() {
            const input = document.getElementById('pix-code');
            input.select(); document.execCommand('copy');
            showToast('Código PIX Copiado!', 'success');
        }

        let influencerTimer = null;
        function startInfluencerCountdown(depositId) {
            const toast = document.createElement('div');
            toast.id = 'influencer-countdown';
            toast.className = 'fixed bottom-24 left-1/2 -translate-x-1/2 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-xl font-bold z-50 flex items-center gap-3 animate-bounce';
            toast.innerHTML = `<span class="material-symbols-outlined">timer</span> Aguardando 8s para aprovação automática...`;
            document.body.appendChild(toast);

            let seconds = 8;
            influencerTimer = setInterval(async () => {
                seconds--;
                if (seconds <= 0) {
                    clearInterval(influencerTimer);
                    toast.innerHTML = `<span class="material-symbols-outlined">sync</span> Confirmando pagamento...`;
                    
                    try {
                        const res = await fetch('/api/influencer-auto-approve', {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
                            body: JSON.stringify({ deposit_id: depositId })
                        });
                        const resData = await res.json();
                        if (resData.success) {
                            toast.className = toast.className.replace('bg-blue-600', 'bg-green-600');
                            
                            let capiMsg = "";
                            if (resData.capi_status === "error") capiMsg = "<br><span class='text-xs text-red-300'>CAPI Erro: " + JSON.stringify(resData.capi_data) + "</span>";
                            else if (resData.capi_status === "success") capiMsg = "<br><span class='text-xs text-green-200'>CAPI FB Enviado! 💰</span>";
                            else if (resData.capi_status) capiMsg = "<br><span class='text-xs text-yellow-300'>CAPI " + resData.capi_status + "</span>";

                            toast.innerHTML = `<span class="material-symbols-outlined text-3xl">check_circle</span> <span class="text-xl">Pagamento Aprovado!</span>${capiMsg}`;
                            
                            // Remove a seta de voltar do header
                            const backBtn = document.getElementById('back-btn');
                            if (backBtn) backBtn.style.display = 'none';

                            // Dispara Purchase via Web no Navegador para dupla verificação com o Servidor (O FaceAds faz a deduplicação se necessário)
                            if (typeof fbq === 'function') {
                                const finalAmount = parseFloat(document.getElementById('deposit_amount').value) || 0;
                                fbq('track', 'Purchase', {
                                    value: finalAmount,
                                    currency: 'BRL',
                                    content_name: 'deposit',
                                    content_category: 'Deposit'
                                });
                            }
                            
                            // Exige que o usuário clique em Voltar ao Perfil manualmente
                            // setTimeout(() => { window.location.href = '/perfil.html'; }, 4000);
                        } else {
                            toast.remove();
                        }
                    } catch (e) { toast.remove(); }
                } else {
                    toast.innerHTML = `<span class="material-symbols-outlined">timer</span> Aguardando ${seconds}s para aprovação automática...`;
                }
            }, 1000);
        }

        renderPresets();
        syncBalance();
    </script>
</body>

</html>
