<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>30win - Bônus de Sugestão</title>
    <link rel="icon" type="image/png" href="/public/FAV.png">
    <link rel="stylesheet" href="/public/assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24
        }

        body {
            background: #0e0e0e;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent
        }

        * {
            scrollbar-width: none;
            -ms-overflow-style: none
        }

        *::-webkit-scrollbar {
            display: none
        }

        .card {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 16px;
            padding: 20px
        }

        .input-f {
            width: 100%;
            background: #111;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 14px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color .3s;
            resize: none
        }

        .input-f:focus {
            border-color: #FFB800
        }

        .btn-sub {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, #FFB800, #FF8A00);
            color: #000;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            transition: all .2s
        }

        .btn-sub:active {
            transform: scale(.97)
        }

        .btn-sub:disabled {
            opacity: .5;
            cursor: not-allowed
        }
    </style>
</head>

<body>
    <div class="max-w-[450px] w-full mx-auto min-h-[100dvh] bg-[#0e0e0e] relative flex flex-col">
        <header class="flex items-center px-4 h-14 border-b border-[#1a1a1a] shrink-0">
            <a href="perfil.html" class="p-2 -ml-2" style="text-decoration:none;color:inherit;"><span
                    class="material-symbols-outlined">arrow_back_ios</span></a>
            <h1 class="flex-1 text-center font-bold text-base">Bônus de Sugestão</h1>
            <div class="w-8"></div>
        </header>

        <main class="flex-1 px-4 pt-5 pb-8 space-y-5">
            <!-- Banner -->
            <div
                class="bg-gradient-to-r from-[#FFB800]/10 to-transparent rounded-2xl border border-[#FFB800]/20 p-5 text-center">
                <span class="material-symbols-outlined text-[#FFB800] text-5xl mb-2"
                    style="font-variation-settings:'FILL' 1">featured_seasonal_and_gifts</span>
                <h2 class="font-bold text-lg">Envie Sua Sugestão!</h2>
                <p class="text-xs text-gray-400 mt-1">Sua opinião vale um bônus! Envie feedbacks e concorra a prêmios
                    exclusivos.</p>
            </div>

            <!-- Form -->
            <div class="card space-y-4">
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">Tipo de Sugestão</label>
                    <select id="sug_type" class="input-f" style="appearance: auto;">
                        <option value="melhoria">Melhoria na plataforma</option>
                        <option value="jogo">Novo jogo</option>
                        <option value="promocao">Promoção</option>
                        <option value="bug">Reportar Bug</option>
                        <option value="outro">Outro</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-bold text-gray-400 mb-2">Sua Sugestão</label>
                    <textarea id="sug_text" class="input-f" rows="5"
                        placeholder="Descreva sua sugestão aqui..."></textarea>
                </div>
                <button id="btn-send" class="btn-sub" onclick="sendSuggestion()">
                    <span class="flex items-center justify-center gap-2">
                        <span class="material-symbols-outlined text-sm">send</span>
                        Enviar Sugestão
                    </span>
                </button>
            </div>

            <!-- History -->
            <div class="card">
                <h3 class="font-bold text-sm mb-3 flex items-center gap-2">
                    <span class="material-symbols-outlined text-gray-500 text-lg">history</span>
                    Suas Sugestões Enviadas
                </h3>
                <div id="history" class="space-y-2">
                    <p class="text-center text-xs text-gray-600 py-4">Nenhuma sugestão enviada ainda.</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('30win_token');
        if (!token) window.location.href = '/auth.html';

        function showToast(msg, type = 'info') {
            const existing = document.getElementById('toast-container'); if (existing) existing.remove();
            const colors = { success: 'from-green-600 to-green-800 border-green-400', error: 'from-red-600 to-red-800 border-red-400', info: 'from-yellow-500 to-orange-600 border-yellow-300' };
            const icons = { success: '✅', error: '❌', info: '💡' };
            const t = document.createElement('div'); t.id = 'toast-container';
            t.className = `fixed top-4 left-1/2 -translate-x-1/2 z-[9999] max-w-[400px] w-[90%] p-4 rounded-xl bg-gradient-to-r ${colors[type] || colors.info} border text-white shadow-2xl flex items-center gap-3 transition-all duration-500`;
            t.style.transform = 'translate(-50%,-100px)'; t.style.opacity = '0';
            t.innerHTML = `<span class="text-xl">${icons[type] || '💡'}</span><span class="text-sm font-bold flex-1">${msg}</span>`;
            document.body.appendChild(t);
            requestAnimationFrame(() => { t.style.transform = 'translate(-50%,0)'; t.style.opacity = '1'; });
            setTimeout(() => { t.style.transform = 'translate(-50%,-100px)'; t.style.opacity = '0'; setTimeout(() => t.remove(), 500); }, 3000);
        }

        function sendSuggestion() {
            const text = document.getElementById('sug_text').value.trim();
            if (!text) return showToast('Escreva sua sugestão antes de enviar.', 'error');
            const type = document.getElementById('sug_type').value;

            const btn = document.getElementById('btn-send'); btn.disabled = true; btn.textContent = 'Enviando...';

            // For now save locally (backend can be added later)
            const history = JSON.parse(localStorage.getItem('30win_suggestions') || '[]');
            history.unshift({ type, text, date: new Date().toLocaleDateString('pt-BR') });
            localStorage.setItem('30win_suggestions', JSON.stringify(history));

            setTimeout(() => {
                showToast('Sugestão enviada com sucesso! Obrigado!', 'success');
                document.getElementById('sug_text').value = '';
                btn.disabled = false; btn.innerHTML = '<span class="flex items-center justify-center gap-2"><span class="material-symbols-outlined text-sm">send</span> Enviar Sugestão</span>';
                renderHistory();
            }, 1000);
        }

        function renderHistory() {
            const history = JSON.parse(localStorage.getItem('30win_suggestions') || '[]');
            const el = document.getElementById('history');
            if (history.length === 0) { el.innerHTML = '<p class="text-center text-xs text-gray-600 py-4">Nenhuma sugestão enviada ainda.</p>'; return; }
            el.innerHTML = history.slice(0, 5).map(h => `
                <div class="flex items-center gap-3 p-3 bg-[#111] rounded-xl border border-[#262626]">
                    <span class="material-symbols-outlined text-[#FFB800] text-lg">description</span>
                    <div class="flex-1 min-w-0">
                        <p class="text-xs font-bold truncate">${h.text}</p>
                        <p class="text-[10px] text-gray-500">${h.type} · ${h.date}</p>
                    </div>
                    <span class="text-[10px] font-bold text-green-400 bg-green-900/30 px-2 py-0.5 rounded-full whitespace-nowrap">Enviado</span>
                </div>
            `).join('');
        }
        renderHistory();
    </script>
</body>

</html>
