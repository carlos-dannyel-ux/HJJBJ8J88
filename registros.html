<!DOCTYPE html>
<html class="dark" lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>30win - Meus Registros</title>
    <link rel="icon" type="image/png" href="/public/FAV.png">
    <link rel="stylesheet" href="/public/assets/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }

        body {
            background-color: #0e0e0e;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        html {
            font-size: 100%;
        }

        .tabs {
            display: flex;
            background: #1a1a1a;
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 20px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            color: #666;
        }

        .tab-btn.active {
            background: #FFB800;
            color: #000;
        }

        .record-card {
            background: #1a1a1a;
            border: 1px solid #262626;
            border-radius: 14px;
            padding: 16px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status-success {
            background: #00e676;
            box-shadow: 0 0 10px rgba(0, 230, 118, 0.4);
        }

        .status-pending {
            background: #FFB800;
            box-shadow: 0 0 10px rgba(255, 184, 0, 0.4);
        }
    </style>
    <script src="/public/pixel.js"></script>
</head>

<body>
    <div class="max-w-[450px] w-full mx-auto min-h-[100dvh] bg-[#0e0e0e] relative flex flex-col">
        <!-- Header -->
        <header class="flex items-center px-4 h-14 border-b border-[#1a1a1a] shrink-0">
            <a href="perfil" class="p-2 -ml-2" style="text-decoration:none;color:inherit;">
                <span class="material-symbols-outlined">arrow_back_ios</span>
            </a>
            <h1 class="flex-1 text-center font-bold text-base">Meus Registros</h1>
            <div class="w-8"></div>
        </header>

        <main class="flex-1 px-4 pt-5 pb-8">
            <!-- Tabs -->
            <div class="tabs">
                <div class="tab-btn active" onclick="switchTab('all')">Tudo</div>
                <div class="tab-btn" onclick="switchTab('deposits')">Depósitos</div>
                <div class="tab-btn" onclick="switchTab('withdrawals')">Saques</div>
            </div>

            <!-- List Content -->
            <div id="list-container" class="space-y-3">
                <!-- Empty State -->
                <div class="flex flex-col items-center justify-center py-20 opacity-30">
                    <span class="material-symbols-outlined text-6xl mb-2">history_toggle_off</span>
                    <p class="text-xs font-bold">Nenhum registro encontrado</p>
                </div>
            </div>
        </main>
    </div>

    <script>
        const token = localStorage.getItem('30win_token');
        if (!token) window.location.href = '/auth.html';

        let currentTab = 'all';

        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            fetchRecords();
        }

        async function fetchRecords() {
            const container = document.getElementById('list-container');
            container.innerHTML = `<div class="flex justify-center p-10"><div class="w-6 h-6 border-2 border-yellow-500 border-t-transparent rounded-full animate-spin"></div></div>`;

            try {
                // Fetching from existing endpoints
                const [depRes, witRes] = await Promise.all([
                    fetch('/api/user/deposits', { headers: { 'Authorization': 'Bearer ' + token } }),
                    fetch('/api/user/withdrawals', { headers: { 'Authorization': 'Bearer ' + token } })
                ]);

                const deposits = (await depRes.json()).deposits || [];
                const withdrawals = (await witRes.json()).withdrawals || [];

                let all = [];
                if (currentTab === 'all' || currentTab === 'deposits') {
                    all = all.concat(deposits.map(d => ({ ...d, type: 'deposito' })));
                }
                if (currentTab === 'all' || currentTab === 'withdrawals') {
                    all = all.concat(withdrawals.map(w => ({ ...w, type: 'saque' })));
                }

                all.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

                if (all.length === 0) {
                    container.innerHTML = `
                        <div class="flex flex-col items-center justify-center py-20 opacity-30">
                            <span class="material-symbols-outlined text-6xl mb-2">history_toggle_off</span>
                            <p class="text-xs font-bold">Nenhum registro encontrado</p>
                        </div>
                    `;
                    return;
                }

                container.innerHTML = all.map(item => `
                    <div class="record-card">
                        <div class="status-dot ${item.status === 'completed' || item.status === 'approved' ? 'status-success' : 'status-pending'}"></div>
                        <div class="flex-1">
                            <p class="font-bold text-sm uppercase">${item.type}</p>
                            <p class="text-[10px] text-gray-500">${new Date(item.created_at).toLocaleString('pt-BR')}</p>
                        </div>
                        <div class="text-right">
                            <p class="font-black text-[#FFB800] text-sm">R$ ${parseFloat(item.amount).toLocaleString('pt-BR', { minimumFractionDigits: 2 })}</p>
                            <p class="text-[9px] font-bold ${item.status === 'completed' || item.status === 'approved' ? 'text-green-500' : 'text-yellow-500'} uppercase">${item.status}</p>
                        </div>
                    </div>
                `).join('');

            } catch (e) {
                container.innerHTML = `<p class="text-center text-red-500 text-xs py-10">Erro ao carregar registros.</p>`;
            }
        }

        fetchRecords();
    </script>
</body>

</html>
