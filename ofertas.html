<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport">
    <title>30win - Ofertas</title>
    <!-- Tailwind CSS v3 -->
    <link rel="icon" type="image/png" href="/public/FAV.png">
    <link rel="stylesheet" href="/public/assets/css/style.css">
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet">
    <style data-purpose="custom-base-styles">
        html,
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0F0F0F !important;
            color: #ffffff;
            -webkit-tap-highlight-color: transparent;
        }

        /* Hide scrollbars globally */
        * {
            scrollbar-width: none;
            -ms-overflow-style: none;
        }

        *::-webkit-scrollbar {
            display: none;
        }

        .text-brand-yellow {
            color: #ffcc00;
        }

        .bg-brand-yellow {
            background-color: #ffcc00;
        }

        .border-brand-yellow {
            border-color: #FFFFFF;
        }
    </style>

    <link
        href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap"
        rel="stylesheet">
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            line-height: 1;
            text-transform: none;
            letter-spacing: normal;
            word-wrap: normal;
            white-space: nowrap;
            direction: ltr;
        }
    </style>
    </style>
</head>

<body class="bg-[#050505] text-white">
    <!-- Mobile-First Wrapper -->
    <div
        class="max-w-[450px] w-full mx-auto h-[100dvh] bg-[#0f0f0f] relative shadow-[0_0_50px_rgba(0,0,0,0.5)] flex flex-col overflow-hidden border-x-2 border-[#0F0F0F]">

        <!-- Top Header -->
        <header class="bg-[#141414] px-4 py-3 flex items-center justify-between border-b border-[#0F0F0F]">
            <div class="flex items-center gap-3">
                <a href="index" class="text-gray-400">
                    <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path d="M15 19l-7-7 7-7" stroke-linecap="round" stroke-linejoin="round" stroke-width="2">
                        </path>
                    </svg>
                </a>
                <h1 class="text-base font-bold">Ofertas</h1>
            </div>
        </header>

        <!-- Content Area: Sidebar + Banners -->
        <div class="flex flex-1 overflow-hidden">
            <!-- Left Sidebar Icons -->
            <nav class="w-[72px] bg-[#111111] border-r border-[#0F0F0F] flex flex-col items-center py-3 gap-1 shrink-0">
                <!-- Misto -->
                <button
                    class="flex flex-col items-center gap-1 px-2 py-2 rounded-lg bg-[#1a1a1a] border border-brand-yellow w-full relative">
                    <span
                        class="absolute -top-1.5 -right-0.5 bg-red-600 text-white text-[8px] font-bold px-1 rounded-full min-w-[14px] text-center">5</span>
                    <svg class="h-5 w-5 text-brand-yellow" fill="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <rect x="3" y="3" width="8" height="8" rx="1.5" />
                        <rect x="13" y="3" width="8" height="8" rx="1.5" />
                        <rect x="3" y="13" width="8" height="8" rx="1.5" />
                        <rect x="13" y="13" width="8" height="8" rx="1.5" />
                    </svg>
                    <span class="text-[8px] text-brand-yellow font-semibold leading-tight">Misto</span>
                </button>

                <!-- Código de resgate -->
                <button
                    class="flex flex-col items-center gap-1 px-2 py-2 rounded-lg hover:bg-[#1a1a1a] w-full transition-colors">
                    <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M15 5v2m0 4v2m0 4v2M5 5a2 2 0 00-2 2v3a2 2 0 110 4v3a2 2 0 002 2h14a2 2 0 002-2v-3a2 2 0 110-4V7a2 2 0 00-2-2H5z"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"></path>
                    </svg>
                    <span class="text-[7px] text-gray-500 font-medium leading-tight text-center">Código<br>de
                        resgate</span>
                </button>
            </nav>

            <!-- Right: Scrollable Banner Area -->
            <main class="flex-1 overflow-y-auto p-3 pb-20">
                <!-- Single Banner with Link to Convite Page -->
                <a href="convite" class="block">
                    <div
                        class="rounded-xl overflow-hidden border border-[#0F0F0F] shadow-lg hover:opacity-90 transition-opacity">
                        <img alt="Bônus de Convite" class="w-full h-auto object-cover"
                            src="https://dppb8rbqlsefl.cloudfront.net/active/ActiveImg7279196607616279.avif">
                    </div>
                </a>
            </main>
        </div>

        <!-- BEGIN: Bottom Navigation -->
        <footer
            class="absolute bottom-0 w-full bg-[#1a1a1a] border-t border-[#0F0F0F] flex items-center justify-around py-2 z-50">
            <a href="index" class="flex flex-col items-center gap-1" style="text-decoration:none;">
                <div class="text-gray-500">
                    <svg class="h-6 w-6" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M3 10.5L12 3L21 10.5V20C21 20.5523 20.5523 21 20 21H15C14.4477 21 14 20.5523 14 20V15C14 14.4477 13.5523 14 13 14H11C10.4477 14 10 14.4477 10 15V20C10 20.5523 9.55228 21 9 21H4C3.44772 21 3 20.5523 3 20V10.5Z"
                            stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M12 3L2 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                        <path d="M12 3L22 11" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
                    </svg>
                </div>
                <span class="text-[10px] text-gray-500">Começar</span>
            </a>
            <button class="flex flex-col items-center gap-1 relative">
                <div class="text-brand-yellow">
                    <svg class="h-6 w-6" fill="currentColor" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>
                <span class="text-[10px] font-bold text-brand-yellow">Ofertas</span>
                <span
                    class="absolute -top-1 right-0 bg-red-600 text-white text-[9px] font-bold px-1 rounded-full min-w-[14px] text-center">9</span>
            </button>

            <a href="suporte" class="flex flex-col items-center gap-1" style="text-decoration:none;">
                <div class="text-gray-500">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>
                <span class="text-[10px] text-gray-500">Suporte</span>
            </a>
            <a href="perfil" id="nav-perfil" class="flex flex-col items-center gap-1 group py-1"
                style="text-decoration:none;">
                <div class="text-gray-600 group-hover:text-white transition-colors">
                    <span class="material-symbols-outlined">person</span>
                </div>
                <span class="text-[9px] font-medium text-gray-600 group-hover:text-white">Perfil</span>
            </a>
            <a href="auth" id="nav-login" class="flex flex-col items-center gap-1"
                style="text-decoration:none; display:none;">
                <div class="text-gray-500">
                    <svg class="h-6 w-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"
                            stroke-linecap="round" stroke-linejoin="round" stroke-width="2"></path>
                    </svg>
                </div>
                <span class="text-[10px] text-gray-500">Login</span>
            </a>
        </footer>
        <script>
            (function () {
                var token = localStorage.getItem('30win_token');
                var loginBtn = document.getElementById('nav-login');
                var perfilBtn = document.getElementById('nav-perfil');
                if (!token) {
                    loginBtn.style.display = 'flex';
                    perfilBtn.style.display = 'none';
                }
            })();
        </script>
        <!-- END: Bottom Navigation -->
    </div>

</body>

</html>
